<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" fill="none">
  <defs>
    <linearGradient id="bBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
    <linearGradient id="bSaree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="bDupatta" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f87171"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="120" cy="135" r="115" fill="url(#bBg)"/>
  <circle cx="120" cy="135" r="108" fill="none" stroke="#b91c1c" stroke-opacity="0.2" stroke-width="2"/>

  <!-- shoulders / saree -->
  <path d="M55 250 C 70 195, 90 175, 120 175 C 150 175, 170 195, 185 250 Z" fill="url(#bSaree)"/>

  <!-- dupatta over head/shoulders -->
  <path d="M62 235 Q 50 170 80 110 Q 100 75 120 70 Q 140 75 160 110 Q 190 170 178 235 Q 170 200 152 188 Q 145 196 145 215 L 145 245 L 95 245 L 95 215 Q 95 196 88 188 Q 70 200 62 235 Z" fill="url(#bDupatta)" fill-opacity="0.92"/>

  <!-- dupatta border pattern -->
  <path d="M62 235 Q 55 200 70 165" stroke="#fde68a" stroke-width="2" fill="none" stroke-opacity="0.85"/>
  <path d="M178 235 Q 185 200 170 165" stroke="#fde68a" stroke-width="2" fill="none" stroke-opacity="0.85"/>

  <!-- neckline & blouse -->
  <path d="M100 180 Q 120 195 140 180 L 138 215 Q 120 224 102 215 Z" fill="#7f1d1d"/>
  <!-- gold neckline trim -->
  <path d="M101 182 Q 120 196 139 182" stroke="#fde68a" stroke-width="2" fill="none"/>

  <!-- neck -->
  <rect x="113" y="155" width="14" height="20" rx="5" fill="#f1c2a1"/>

  <!-- necklace -->
  <path d="M105 170 Q 120 184 135 170" stroke="#f59e0b" stroke-width="1.6" fill="none"/>
  <circle cx="120" cy="184" r="3.5" fill="#dc2626" stroke="#f59e0b" stroke-width="1"/>

  <!-- head -->
  <circle cx="120" cy="130" r="35" fill="#f5c9a8"/>

  <!-- hair (parted center) -->
  <path d="M86 130 Q 88 92 120 88 Q 152 92 154 130 Q 150 115 138 110 Q 120 105 102 110 Q 90 115 86 130 Z" fill="#1c1410"/>

  <!-- maang tika / sindoor -->
  <path d="M118 100 L 122 100 L 120 92 Z" fill="#dc2626"/>
  <circle cx="120" cy="105" r="2.4" fill="#f59e0b" stroke="#fde68a" stroke-width="0.8"/>

  <!-- bindi -->
  <circle cx="120" cy="118" r="2.2" fill="#dc2626"/>

  <!-- eyes -->
  <circle cx="108" cy="130" r="2.2" fill="#1f2937"/>
  <circle cx="132" cy="130" r="2.2" fill="#1f2937"/>
  <!-- kajal -->
  <path d="M104 132 Q 108 133 112 132" stroke="#1f2937" stroke-width="1" stroke-linecap="round" fill="none"/>
  <path d="M128 132 Q 132 133 136 132" stroke="#1f2937" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- eyebrows -->
  <path d="M101 122 Q 108 119 115 122" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M125 122 Q 132 119 139 122" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round"/>

  <!-- lips -->
  <path d="M113 144 Q 120 150 127 144 Q 120 148 113 144 Z" fill="#b91c1c"/>

  <!-- earrings -->
  <circle cx="86" cy="142" r="3.5" fill="#f59e0b" stroke="#fde68a" stroke-width="0.8"/>
  <circle cx="154" cy="142" r="3.5" fill="#f59e0b" stroke="#fde68a" stroke-width="0.8"/>

  <!-- gold bangle hint on chest line -->
  <path d="M75 230 Q 120 245 165 230" stroke="#fde68a" stroke-width="1.5" fill="none" stroke-opacity="0.7"/>
  <path d="M75 240 Q 120 252 165 240" stroke="#fde68a" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
</svg>
