<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" fill="none">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="gAchkan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbe9c7"/>
      <stop offset="1" stop-color="#e9c97a"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="120" cy="135" r="115" fill="url(#gBg)"/>

  <!-- subtle ring -->
  <circle cx="120" cy="135" r="108" fill="none" stroke="#d97706" stroke-opacity="0.18" stroke-width="2"/>

  <!-- shoulders / achkan -->
  <path d="M55 250 C 70 195, 90 175, 120 175 C 150 175, 170 195, 185 250 Z" fill="url(#gAchkan)"/>
  <path d="M120 175 L 120 250" stroke="#b8862a" stroke-width="2" stroke-opacity="0.5"/>
  <!-- collar -->
  <path d="M100 180 Q 120 195 140 180 L 138 210 Q 120 222 102 210 Z" fill="#b91c1c"/>
  <!-- buttons -->
  <circle cx="120" cy="196" r="2.2" fill="#fde68a"/>
  <circle cx="120" cy="206" r="2.2" fill="#fde68a"/>
  <circle cx="120" cy="216" r="2.2" fill="#fde68a"/>

  <!-- neck -->
  <rect x="113" y="155" width="14" height="20" rx="5" fill="#e6b88a"/>

  <!-- head -->
  <circle cx="120" cy="130" r="35" fill="#eec39d"/>

  <!-- hair -->
  <path d="M86 122 Q 92 90 120 88 Q 150 90 154 124 Q 144 110 120 110 Q 96 112 86 122 Z" fill="#2a1a10"/>

  <!-- safa / turban (red + gold) -->
  <path d="M78 110 Q 90 70 120 70 Q 150 70 162 112 Q 158 90 120 80 Q 84 88 78 110 Z" fill="#b91c1c"/>
  <path d="M88 105 Q 120 78 152 105 Q 152 96 145 92 Q 120 85 95 92 Q 88 96 88 105 Z" fill="#dc2626"/>
  <!-- turban stripes -->
  <path d="M86 110 Q 120 78 154 110" stroke="#fde68a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M90 102 Q 120 82 150 102" stroke="#fde68a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- turban gem (kalgi) -->
  <path d="M120 75 L 122 65 L 126 70 L 120 68 L 114 70 L 118 65 Z" fill="#f59e0b"/>
  <circle cx="120" cy="74" r="3" fill="#dc2626" stroke="#fde68a" stroke-width="1"/>

  <!-- eyes -->
  <circle cx="108" cy="130" r="2.2" fill="#1f2937"/>
  <circle cx="132" cy="130" r="2.2" fill="#1f2937"/>

  <!-- eyebrows -->
  <path d="M101 122 Q 108 119 115 122" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M125 122 Q 132 119 139 122" stroke="#1f2937" stroke-width="1.6" stroke-linecap="round"/>

  <!-- smile -->
  <path d="M111 144 Q 120 150 129 144" stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- moustache -->
  <path d="M108 140 Q 120 144 132 140 Q 128 138 120 139 Q 112 138 108 140 Z" fill="#2a1a10"/>

  <!-- garland (varmala) -->
  <path d="M70 200 Q 120 215 170 200" stroke="#b45309" stroke-width="2" fill="none"/>
  <g fill="#f59e0b" stroke="#b45309" stroke-width="0.6">
    <circle cx="80" cy="206" r="4"/>
    <circle cx="95" cy="212" r="4"/>
    <circle cx="110" cy="214" r="4"/>
    <circle cx="125" cy="214" r="4"/>
    <circle cx="140" cy="212" r="4"/>
    <circle cx="155" cy="208" r="4"/>
    <circle cx="170" cy="202" r="4"/>
  </g>
</svg>
